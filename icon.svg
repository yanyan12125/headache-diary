<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6f1"/>
      <stop offset="100%" stop-color="#f5ede4"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a0a0"/>
      <stop offset="100%" stop-color="#c48888"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8bfa8"/>
      <stop offset="100%" stop-color="#8aaa8a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Soft ambient circle -->
  <circle cx="256" cy="240" r="140" fill="#d4a0a0" opacity="0.08"/>
  <!-- Flower / healing motif -->
  <!-- Center -->
  <circle cx="256" cy="232" r="28" fill="#d4b888" opacity="0.9"/>
  <!-- Petals -->
  <ellipse cx="256" cy="184" rx="24" ry="38" fill="url(#petal)" opacity="0.85"/>
  <ellipse cx="256" cy="184" rx="24" ry="38" fill="url(#petal)" opacity="0.75" transform="rotate(60 256 232)"/>
  <ellipse cx="256" cy="184" rx="24" ry="38" fill="url(#petal)" opacity="0.80" transform="rotate(120 256 232)"/>
  <ellipse cx="256" cy="184" rx="24" ry="38" fill="url(#petal)" opacity="0.70" transform="rotate(180 256 232)"/>
  <ellipse cx="256" cy="184" rx="24" ry="38" fill="url(#petal)" opacity="0.75" transform="rotate(240 256 232)"/>
  <ellipse cx="256" cy="184" rx="24" ry="38" fill="url(#petal)" opacity="0.80" transform="rotate(300 256 232)"/>
  <!-- Center dot -->
  <circle cx="256" cy="232" r="16" fill="#f5ede4"/>
  <circle cx="256" cy="232" r="8" fill="#d4a0a0" opacity="0.6"/>
  <!-- Leaves -->
  <ellipse cx="210" cy="290" rx="12" ry="28" fill="url(#leaf)" opacity="0.7" transform="rotate(-30 210 290)"/>
  <ellipse cx="302" cy="290" rx="12" ry="28" fill="url(#leaf)" opacity="0.7" transform="rotate(30 302 290)"/>
  <!-- Stem hint -->
  <line x1="256" y1="260" x2="256" y2="310" stroke="#a8bfa8" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" font-family="Georgia, 'Noto Serif SC', serif" font-size="48" font-weight="700" fill="#3d3530" letter-spacing="-1">头痛日记</text>
  <text x="256" y="416" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" fill="#a89e96" font-weight="300">Headache Diary</text>
</svg>
